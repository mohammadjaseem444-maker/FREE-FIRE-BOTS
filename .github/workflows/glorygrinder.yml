name: Nexus Sovereign Squad Grinder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  squad-grind:
    strategy:
      matrix:
        squad_id: [1, 2, 3]
    runs-on: ubuntu-latest
    timeout-minutes: 60 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install ADB Only
        run: |
          sudo apt-get update
          # Docker pehle se hota hai, isliye sirf adb install karenge
          sudo apt-get install -y adb

      - name: Start Virtual Android (Redroid)
        run: |
          # Docker.io ki jagah seedha docker command use karenge
          sudo docker run -d --privileged -p 5555:5555 --name bot_1 redroid/redroid:11.0.0-latest
          sudo docker run -d --privileged -p 5557:5555 --name bot_2 redroid/redroid:11.0.0-latest
          
          echo "Waiting for Android boot (30s)..."
          sleep 30
          
          adb connect localhost:5555
          adb connect localhost:5557
          adb devices

      - name: Install Python Dependencies
        run: |
          pip install pure-python-adb opencv-python numpy

      - name: Execute Sovereign Engine
        run: python nexus_bot_engine.py
        env:
          GUILD_ID: "3047387700"
          SQUAD_ID: ${{ matrix.squad_id }}
