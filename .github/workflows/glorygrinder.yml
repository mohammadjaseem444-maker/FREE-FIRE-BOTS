name: Nexus Sovereign Squad Grinder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  grind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install ADB
        run: sudo apt-get update && sudo apt-get install -y adb

      - name: Start Virtual Android (Redroid)
        run: |
          sudo docker run -d --privileged -p 5555:5555 --name bot_1 redroid/redroid:11.0.0-latest
          
          echo "Connecting to ADB..."
          adb connect localhost:5555
          
          echo "Waiting for device to come online (Isme 2-3 min lag sakte hain)..."
          # Ye command tab tak rukega jab tak device ready na ho jaye
          timeout 300s bash -c 'until adb -s localhost:5555 shell getprop sys.boot_completed | grep -m 1 "1"; do sleep 5; echo "Still booting..."; done'
          
          adb devices
          echo "Device is now ONLINE!"

      - name: Install Python Dependencies
        run: pip install pure-python-adb opencv-python numpy

      - name: Execute Sovereign Engine
        run: python freefirebotengine.py
        env:
          GUILD_ID: "3047387700"
